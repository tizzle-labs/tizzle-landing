server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Directory-based routing — /whitepaper/ serves whitepaper/index.html
    # nginx auto-redirects /whitepaper to /whitepaper/ (trailing slash)
    location / {
        try_files $uri $uri/ =404;
    }

    # Gzip compression for static assets
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
}
